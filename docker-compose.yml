services:
  backend:
    build: ./backend
    container_name: nf_backend
    image: nf_backend
    ports:
      - "${BACK_PORT}:3000"
    environment:
      - PORT=${BACK_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${MYSQL_DATABASE}
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
    depends_on:
      - mysql
    networks:
      - nf_app

  frontend:
    build: ./frontend
    container_name: nf_frontend
    image: nf_frontend
    stdin_open: true
    ports:
      - "5173:5173"
    networks:
      - nf_app

  mysql:
    image: mysql:8.4
    container_name: nf_mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - nf_app

networks:
  nf_app:
    driver: bridge

volumes:
  mysql_data:
    name: nf_mysql_data
