services:

  mysql:
    image: mysql:8.4
    container_name: nf_mysql
    restart: unless-stopped
    command: --default-time-zone='-06:00'
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u root -p$MYSQL_ROOT_PASSWORD" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nf_network

  backend:
    build: ./backend
    image: nf_backend:1.0
    container_name: nf_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACK_PORT}:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - nf_network

  frontend:
    build: ./frontend
    image: nf_frontend:1.0
    container_name: nf_frontend
    restart: unless-stopped
    ports:
      - "${FRONT_PORT}:80"
    depends_on:
      - backend
    networks:
      - nf_network

networks:
  nf_network:
    driver: bridge

volumes:
  mysql_data:
